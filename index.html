<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Informações do IP</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        input { padding: 8px; width: 70%; }
        button { padding: 8px 15px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Busca de Informações do IP</h2>
    <input type="text" id="ipInput" placeholder="Digite o IP (ex: 8.8.8.8)">
    <button onclick="buscarIP()">Buscar</button>

    <table id="resultadoTabela">
        <thead>
            <tr>
                <th>Campo</th>
                <th>Informação</th>
            </tr>
        </thead>
        <tbody id="tabelaCorpo">
            <!-- Dados da API entrarão aqui -->
        </tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
